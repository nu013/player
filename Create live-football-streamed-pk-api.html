<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Live Football</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
}

/* FULL VIDEO */
#player{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}



/* TOGGLE BTN */
#toggle{
    position:absolute;
    top:10px;
    left:10px;
    z-index:20;
    background:red;
    color:#fff;
    padding:6px 10px;
    cursor:pointer;
    border-radius:5px;
    display :none;
}



/* TIME */
.time{
    color:orange;
    font-size:12px;
}

/* LIVE */
.live{
    color:red;
    font-weight:bold;
}
  
.dot { font-size:9px; color: #ff0000; animation: blink 1s infinite; }
@keyframes blink { 0% {opacity:1;} 50% {opacity:0.0;} 100% {opacity:1;} }
/* LINK BUTTON */
#links{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:15;
}
.link-btn{
    background:#ffa805;
    border:none;
    padding:4px 8px;
    margin:2px;
    cursor:pointer;
}
.link-btn.active{
    background:#000;
    color:yellow;
}
  
  
#panel-wrapper{
    position:absolute; 
    background:#0d4a5e;
    top:0;
    left:0;
    width:220px;
    height:100%;
    z-index:10;
}
#panel-wrapper.hide{
    transform:translateX(-110%);
    transition:0.3s;
}
/* PANEL (scroll works here) */
#panel{
    margin-top:15px;
    margin-left:15px;
    width:210;
    height:90%;
    background:rgba(0,0,0,0);
    overflow:auto;   /* 🔥 scrollbar BACK */
}
  
/* MATCH ITEM */
.match{
    padding:6px;
    cursor:pointer;
    font-size:13px;
    border-bottom:1px solid yellow;/* 00FFFF  */
    border-top:1px solid yellow;/*  00FFFF  */
    border-left: 1px solid yellow;/*  00FFFF  */
    border-radius: 10px 0px 0px 10px;
    margin-bottom:6px;
    background:rgba(0,0,0,0.7);
  
}
.match:hover{
    background:#222;
}
.match.active{
    background:#0d4a5e;    
    border-left:3px solid lime;

  }
/* CLOSE BUTTON OUTSIDE */
#closeBtn{
    position:absolute;
    top:5px;
    right:-5px;
    background:#000;
    color:red;
    padding:3px 8px;
    border-radius:50px;
    border:2px solid #999;
    cursor:pointer;

    z-index:9999;
}
  
  
</style>
</head>

<body>

<div id="toggle">☰</div>

<iframe id="player" allow="autoplay; encrypted-media"></iframe>

<div id="links"></div>

<div id="panel-wrapper">
    <div id="closeBtn">✖</div>
    <div id="panel"></div>
</div>
  
  
<script>
const prx = "https://purple-dust-525dproxy.nu01302910955.workers.dev/?url=";
const api = "https://streamed.pk/api/matches/football";

let matchesList=[];

  
  
const toggleBtn = document.getElementById("toggle");
const panelWrapper = document.getElementById("panel-wrapper");
const closeBtn = document.getElementById("closeBtn");

/* OPEN LIST */
toggleBtn.onclick = ()=>{
    panelWrapper.classList.remove("hide");
    toggleBtn.style.display = "none";
};

/* CLOSE LIST */
closeBtn.onclick = ()=>{
    panelWrapper.classList.add("hide");
    toggleBtn.style.display = "block";
};

/* LOAD MATCH */
fetch(prx+encodeURIComponent(api))
.then(r=>r.json())
.then(data=>{

    let panel=document.getElementById("panel");

    data.forEach(match=>{

        if(!match.sources || match.sources.length==0) return;

        let m=document.createElement("div");
        m.className="match";
m.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="time" style=" white-space:nowrap;"> Match time</span>&nbsp; &nbsp; <span style="color:lime;" > <u> ${match.title} </u></span>
    </div>
`;

        m.dataset.links=JSON.stringify(
            match.sources.map(s=>`https://streamed.pk/api/stream/${s.source}/${s.id}`)
        );

        panel.appendChild(m);

        matchesList.push({
            el:m,
            date:new Date(match.date)
        });

        m.onclick=()=>showLinks(m);
    });

    setInterval(updateTime,1000);

    // AUTO PLAY FIRST
    setTimeout(()=>{
        let first=document.querySelector(".match");
        if(first) showLinks(first);
    },500);

});

/* SHOW LINKS */
function showLinks(matchEl){

    document.querySelectorAll(".match").forEach(m=>m.classList.remove("active"));
    matchEl.classList.add("active");

    let links=JSON.parse(matchEl.dataset.links);
  
  
    let container=document.getElementById("links");
    container.innerHTML="";

  // 👉 এইটা  function CALL for IF HAVE ONE BTN then display none....
    handleSingleLinkUI(links);
  
  
    links.slice(0,3).forEach((link,i)=>{
        let btn=document.createElement("button");
        btn.className="link-btn";
        btn.innerText="PLAY "+(i+1);

        btn.onclick=()=>{
            document.querySelectorAll(".link-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            play(link);
        };

        container.appendChild(btn);
    });

    if(links.length>0){
        play(links[0]);
        container.querySelector(".link-btn").classList.add("active");
    }
}

/* PLAY VIDEO */
async function play(link){
    let r=await fetch(prx+encodeURIComponent(link));
    let d=await r.json();

    if(d[0] && d[0].embedUrl){
        document.getElementById("player").src=d[0].embedUrl;
    }
}

/* COUNTDOWN + LIVE */
function updateTime(){
    let now=new Date();

    matchesList.forEach(m=>{

        let diff=(m.date-now)/1000;
        let el=m.el.querySelector(".time");

        if(diff>0){
            let h=Math.floor(diff/3600);
            let mm=Math.floor((diff%3600)/60);
            let s=Math.floor(diff%60);

           // el.innerHTML=`⏳ ${pad(h)}:${pad(mm)}:${pad(s)}`;
            el.innerHTML=` ${pad(h)}:${pad(mm)}: <span style="color:#ff7403;"> ${pad(s)} </span>  `;
          
        }
        else if(diff>-7200){
            el.innerHTML=`  <span class="dot"> 🔴 </span>  <span class="live">Live</span> &nbsp; `;
        }
        else{
            m.el.style.display="none";
        }
    });
}

function pad(n){
    return n.toString().padStart(2,"0");
}
  
  
  
 function handleSingleLinkUI(links){   // 👉 এই  function  for IF HAVE ONE BTN then display none
  
    let linkContainer = document.getElementById("links");

    if(links.length <= 1){
        linkContainer.style.display = "none"; // hide
    } else {
        linkContainer.style.display = "block"; // show
    }
}
  
  
</script>

</body>
</html>
