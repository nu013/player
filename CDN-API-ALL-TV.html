<div id="channel-app">
  
  
  <style>
    #channel-app { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: auto; padding: 10px; }
    
    /* প্লেয়ার সেকশন */
    .player-section { margin-bottom: 10px; background: #000; border-radius: 10px; overflow: hidden; aspect-ratio: 16 / 9; }
    #mainPlayer { width: 100%; height: 100%; border: none; }
    
    /* লিংক প্রদর্শনের জায়গা border-left: 4px solid #d9534f;*/
    .link-display { 
      background: rgba(17, 17, 17, 0.0); padding: 10px; border-radius: 5px;  text-align: center;
      margin-bottom: 10px; font-size: 13px; word-break: break-all; height: 15px;
       color: #444;
    }

    /* সার্চ বক্স স্টাইল */
    .search-container { margin-bottom: 5px; text-align: center; }
    #channelSearch { 
      width: 70%; padding: 10px 20px; border: 2px solid #ddd; background-color: #222; 
      border-radius: 30px; outline: none; font-size: 16px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s;
    }
    #channelSearch:focus { border-color: #d9534f; box-shadow: 0 2px 10px rgba(217, 83, 79, 0.2); }

    /* A-Z ফিল্টার স্টাইল */
    .alphabet-filter { 
      display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; 
      justify-content: center; 
    }
    .letter-btn {
      padding: 5px 10px; border: 1px solid #ddd; background: #fff;
      cursor: pointer; border-radius: 4px; font-size: 12px; transition: 0.2s;
    }
    .letter-btn:hover, .letter-btn.active { background: #d9534f; color: white; border-color: #d9534f; }

    /* চ্যানেল গ্রিড স্টাইল */
    .channel-grid { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
      gap: 12px; 
    }

    /* চ্যানেল বাটন স্টাইল */
    .channel-btn { 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #f8f9fa; border: 1px solid #eee; border-radius: 10px;
      padding: 15px; cursor: pointer; color: #333;
      transition: all 0.2s ease; position: relative; overflow: hidden;
      border-bottom: 3px solid #ccc;
    }
    .channel-btn:hover { transform: translateY(-3px); border-color: #d9534f; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    
    .ch-name { font-weight: bold; font-size: 14px; text-align: center; margin-bottom: 8px; }
    
    /* স্ট্যাটাস ডট */
    .status-badge { 
      font-size: 10px; padding: 2px 8px; border-radius: 5px; 
      text-transform: uppercase; font-weight: bold;
    }
    .online { background: #dff0d8; color: #3c763d; }
    .offline { background: #f2dede; color: #a94442; }

    #loadingMsg { text-align: center; color: #666; padding: 50px; }
  </style>

  <div class="search-container">
    <input type="text" id="channelSearch" placeholder="চ্যানেলের নাম লিখুন (Search)..." onkeyup="filterChannels()">
  </div>

  <div class="player-section">
   <iframe 
    id="mainPlayer" 
    src="" 
    allowfullscreen 
    referrerpolicy="no-referrer" 
    allow="encrypted-media; autoplay">
</iframe>
  </div>
  
  <div style="text-align: center; height: 10px; margin-bottom: 5px;" id="chNameDisplay"> Select Channel  </div>

  <div class="link-display" id="urlDisplay"> From below </div>

  <div class="alphabet-filter" id="alphabetFilter">
    <button class="letter-btn active" onclick="filterByLetter('ALL')">ALL</button>
  </div>

  <div id="loadingMsg">চ্যানেল তালিকা লোড হচ্ছে...</div>
  <div id="channelGrid" class="channel-grid"></div>
</div>

<script>
let channelData = [];
let currentLetter = 'ALL';

// A-Z বাটন তৈরি করা
const alphabetContainer = document.getElementById('alphabetFilter');
for (let i = 65; i <= 90; i++) {
  let letter = String.fromCharCode(i);
  let btn = document.createElement('button');
  btn.className = 'letter-btn';
  btn.innerText = letter;
  btn.onclick = () => filterByLetter(letter);
  alphabetContainer.appendChild(btn);
}

async function loadChannels() {
  try {
    // এখানে API লোড করার সময় প্রক্সি ব্যবহার করা হয়েছে
    const apiUrl = 'https://api.cdnlivetv.tv/api/v1/channels/?user=cdnlivetv&plan=free';
    const proxy = 'https://purple-dust-525dproxy.nu01302910955.workers.dev/?url='; 
    
    const response = await fetch(proxy + encodeURIComponent(apiUrl));
    const data = await response.json();
    channelData = data.channels;

    displayChannels(channelData);
    document.getElementById('loadingMsg').style.display = 'none';
  } catch (error) {
    document.getElementById('loadingMsg').innerHTML = "লোড করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।";
  }
}

function displayChannels(channels) {
  const grid = document.getElementById('channelGrid');
  grid.innerHTML = '';

  channels.forEach(ch => {
    const btn = document.createElement('div');
    btn.className = 'channel-btn';
    btn.onclick = () => playChannel(ch.url, ch.name);
    
    const isOnline = ch.status === 'online';
    
    btn.innerHTML = `
      <span class="ch-name">📺 ${ch.name}</span>
      <span class="status-badge ${isOnline ? 'online' : 'offline'}">${ch.status}</span>
    `;
    grid.appendChild(btn);
  });
}


function playChannel(url, name) {
  const player = document.getElementById('mainPlayer');
  
  // ১. প্রথমে প্লেয়ারটি খালি করে নিন যাতে রিলোড সমস্যা না হয়
  player.src = "about:blank"; 
  
  // ২. সামান্য সময় নিয়ে নতুন URL সেট করুন (এটি ব্রাউজারকে বাধ্য করে নতুন করে লোড নিতে)
  setTimeout(() => {
    player.src = url;
  }, 100);

  document.getElementById('urlDisplay').innerHTML = `   ${url}`;
  document.getElementById('chNameDisplay').innerHTML = ` ${name}`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// সার্চ ফিল্টার
function filterChannels() {
  const term = document.getElementById('channelSearch').value.toLowerCase();
  const filtered = channelData.filter(ch => 
    (ch.name.toLowerCase().includes(term) || ch.code.toLowerCase().includes(term)) &&
    (currentLetter === 'ALL' || ch.name.toUpperCase().startsWith(currentLetter))
  );
  displayChannels(filtered);
}

// A-Z ফিল্টার ফাংশন
function filterByLetter(letter) {
  currentLetter = letter;
  
  document.querySelectorAll('.letter-btn').forEach(btn => {
    btn.classList.remove('active');
    if(btn.innerText === letter) btn.classList.add('active');
  });

  const filtered = channelData.filter(ch => 
    letter === 'ALL' ? true : ch.name.toUpperCase().startsWith(letter)
  );
  displayChannels(filtered);
}

loadChannels();
</script>
