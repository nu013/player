<script>
function isMobileOrTablet(){
    // Android / iOS / iPad / tablet detection
    return /Android|iPhone|iPad|iPod|Tablet|PlayBook/i.test(navigator.userAgent);
}

function isMessengerBrowser(){
    // Facebook / Messenger in-app browser detection
    return /FBAN|FBAV|Messenger/i.test(navigator.userAgent);
}

function checkApp(){

    if(!isMobileOrTablet()) return; // only mobile or tablet

    var start = Date.now();

    // Try to open app (deep link)
    window.location = "uddinsp://open";

    // If app not installed → show popup
    setTimeout(function(){
        if(Date.now() - start < 2000){
            document.getElementById("appPopup").style.display = "block";
        }
    }, 1500);
}

function downloadApp(){
    var link = document.createElement("a");
    // Your Google Drive / PHP hosted APK link
    link.href = "https://drive.google.com/uc?export=download&id=1JPb9kWwzjqKNyd-vkjzx2qHKMLTRDtvg";
    link.download = "UDDiNsp.apk";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// Run after page load
window.addEventListener("load", checkApp);
</script>
