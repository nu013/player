<script>
let deferredPrompt;

// ------------------- PWA Installed Check -------------------
function isPWAInstalled() {
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

// ------------------- Device / Browser Detection -------------------
function isMobileOrTablet() {
  return /Android|iPhone|iPad|iPod|Tablet|PlayBook/i.test(navigator.userAgent);
}

// ------------------- Messenger / FB Browser Detection -------------------
function isMessengerBrowser() {
  return /FBAN|FBAV|Messenger/i.test(navigator.userAgent);
}

// ------------------- Browser Detection -------------------
function getBrowserName() {
  const ua = navigator.userAgent;
  if(/Chrome/i.test(ua) && !/Edg/i.test(ua)) return "Chrome";
  if(/Edg/i.test(ua)) return "Edge";
  if(/Safari/i.test(ua) && !/Chrome/i.test(ua)) return "Safari";
  if(/Firefox/i.test(ua)) return "Firefox";
  return "Other";
}

// ------------------- Close Popup -------------------
function closePopup() {
  document.getElementById('appPopup').style.display = 'none';
}

// ------------------- Handle Install Click -------------------
function handleInstallClick() {
  const popup = document.getElementById('appPopup');
  popup.style.display = 'none';
  const siteURL = window.location.href;

  // PWA install prompt
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{ deferredPrompt = null; });
    return;
  }

  // Messenger / FB in-app → redirect to Chrome intent
  if(isMessengerBrowser()){
    window.location = "intent://" + siteURL.replace(/^https?:\/\//,"") + "#Intent;scheme=https;package=com.android.chrome;end";
    return;
  }

  // Other browsers → open in new tab (shortcut / install)
  window.open(siteURL, "_blank");
}

// ------------------- Capture beforeinstallprompt -------------------
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
});

// ------------------- Check External PHP App Endpoint -------------------
async function isPHPAppAvailable() {
  try {
    const res = await fetch("https://nu013.github.io/player/checkPwaApp.php", { method: "GET" });
    const data = await res.json();
    return data.installed; // true → app exists, hide popup
  } catch(e) {
    return false; // error → assume app not installed
  }
}

// ------------------- Show Popup Logic -------------------
async function initPopup() {
  // 1️⃣ PWA already installed → hide popup
  if(isPWAInstalled()) return;

  // 2️⃣ Check external PHP app → hide popup if installed
  const phpExists = await isPHPAppAvailable();
  if(phpExists) return;

  // 3️⃣ Show popup
  document.getElementById('appPopup').style.display = 'block';
}

// ------------------- On Page Load -------------------
window.addEventListener('load', ()=>{ initPopup(); });
</script>
