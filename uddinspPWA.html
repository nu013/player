<div id="appPopup" style="display:none;position:fixed;bottom:20px;left:20px;right:20px;background:#fff;padding:20px;text-align:center;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.3);z-index:9999;">

  <button onclick="installPWA()" style="padding:12px 25px;background:#28a745;color:#fff;border:none;border-radius:6px;">
    Install App
  </button>
</div>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('appPopup').style.display = 'block';
});

function installPWA(){
    document.getElementById('appPopup').style.display='none';
    if(deferredPrompt){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult)=>{
            deferredPrompt = null;
        });
    }
}
</script>
