// ===== FILTER APPLY =====
// ===== FILTER APPLY (FINAL) =====
function applyFilters() {

    const params = new URLSearchParams(window.location.search);

    const typeParam = params.get('type');
    const query = params.get('q');

    const isSearchPage = (typeParam === 'multi' && query);

    // ===== SEARCH PAGE → ONLY TYPE =====
    if (isSearchPage) {

        const t = document.getElementById('type-filter')?.value || 'multi';
        params.set('type', t);

    } else {

        const lang = document.getElementById('language-filter')?.value;
        const year = document.getElementById('year-filter')?.value;

        // LANGUAGE
        if (lang) params.set('with_original_language', lang);
        else params.delete('with_original_language');

        // YEAR
        params.delete('primary_release_year');
        params.delete('first_air_date_year');

        if (year) {
            params.set('primary_release_year', year);
        }
    }

    params.delete('page');
    window.location.search = params.toString();
}



// ===== CREATE FILTER UI (FINAL) =====

                <option value="movie">Movie</option>
                <option value="tv">Series</option>

                <option>2025</option>

            `;
        }
