<!DOCTYPE html>
<html lang="bn">
<head>

<!-- =================================
CHARSET + MOBILE VIEW
================================= -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- =================================
PAGE TITLE
================================= -->
<title>PHP IFRAME PLAYER</title>

<style>

/* =================================
পুরো পেজ black background
================================= */

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}


/* =================================
PLAYER WRAPPER
================================= */

#video-wrapper{
width:100vw;
height:100vh;
position:relative;
background:#000;
}


/* =================================
IFRAME FULLSCREEN
================================= */

iframe{
width:100%;
height:100%;
border:none;
}


/* =================================
ভিডিওর মাঝখানের লেখা
================================= */

#centerText{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

text-align:center;

color:yellow;

font-size:18px;

font-weight:bold;

background:rgba(0,0,0,0);

z-index:10;

}


/* =================================
Volume hint icon position
================================= */

#volumeIcon{

bottom:11px;

right:105px;

position:absolute;

z-index:1500;

pointer-events:none;

}

#volumeIcon svg{

height:32px;
width:32px;

}

</style>

</head>

<body>


<div id="video-wrapper">


<!-- =================================
IFRAME PLAYER

এখানে PHP / EMBED PAGE লোড হবে
================================= -->

<iframe
id="phpFrame"
sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
allowfullscreen
></iframe>



<!-- =================================
CENTER TEXT MESSAGE
================================= -->

<div id="centerText">

Click 4/5 Times 🔊 Volume Button for UNMUTE

</div>



<!-- =================================
VOLUME ICON
================================= -->

<div id="volumeIcon">

<svg viewBox="0 0 24 24">

<path d="M11 5L6 9H2V15H6L11 19V5Z" fill="lime" stroke="red" stroke-width="2" stroke-linejoin="round"/>

<path d="M15.5 8.5C16.8333 9.66667 17.5 11.1667 17.5 13C17.5 14.8333 16.8333 16.3333 15.5 17.5" stroke="red" stroke-width="2" stroke-linecap="round"/>

</svg>

</div>


</div>


<script>

/*

========================================

URL PARAMETER SYSTEM

Example link:

playerphp.html?url=https://streamcrichd.com/update/willowcricket.php

FULL Example:

https://asmaakther.github.io/playerphp/playerphp.html?url=https://streamcrichd.com/update/willowcricket.php

========================================

*/


/* URL PARAMETER READ */

const params=new URLSearchParams(window.location.search);


/* URL GET */

const url=params.get("url");


/* iframe select */

const frame=document.getElementById("phpFrame");


/* যদি URL থাকে iframe load করবে */

if(url){

frame.src=url;

}


/* যদি URL না থাকে error message */

else{

document.getElementById("centerText").innerHTML="NO STREAM LINK FOUND";

}


/* =================================
CENTER TEXT AUTO HIDE
5000 = 5 seconds
================================= */

setTimeout(function(){

document.getElementById("centerText").style.display="none";

},5000);


</script>

</body>
</html>
