
<html lang="bn">
<head>
<meta charset="UTF-8"></meta>

<title>willow</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

#video-wrapper {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: #000;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* server button style */
.server-btn{
    white-space: nowrap;   /* 🔥 এইটা যোগ করো */
    background: #ffa805;
    color: black;
    border: 1px solid yellow;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
  
}

.server-btn.active{
    background: black;
    color: yellow;
    font-weight: bold;
}


/* unmute message */
#unmuteMsg {
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: 2px solid #fff;
    padding: 10px 15px;
    border-radius: 8px;
    text-align: center;
    z-index:99999;
    opacity: 0;
    transition: all 0.2s ease;
}

#unmuteMsg.show {
    bottom: 10px;
    opacity: 1;
}

#unmuteMsg.hide {
    bottom: -60px;
    opacity: 0;
}
      
#loding {
    position: absolute;
    pointer-events: none;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);  
    text-align: center;
    align-items: center;
    color: white; 
    background: rgba(0,0,0,0.0);
    padding: 0px ;
    margin: 0px;
    z-index: 10;
     /* font-size: 20px; */
    display: none;
    /* blink animation */
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
</style>
</head>
<body>

<div id="video-wrapper">
  
 <div id="loding">Looding..</div>

    <!-- server buttons -->

    <div id="serverButtons" style="display: flex; gap: 5px; left: 50%; position: absolute; top: 5px; transform: translateX(-50%); z-index: 1000;">  </div>

<script>
const serverData = [
  

  
    { name: '<span style="font-size:9px;color:#000; background:#fff; padding:2px 0px 2px 4px; border-radius:25px; margin-right:-3px;">▶ </span> &nbsp; TV1', url: 
"https://flixxlive.pro/tv/superpremier_english.php",
   countdown: 7 },
    
  { name: '<span style="font-size:9px;color:#000; background:#fff; padding:2px 0px 2px 4px; border-radius:25px; margin-right:-3px;">▶ </span> &nbsp; 2', url: "https://flixxlive.pro/tv/skypremier_german.php",  countdown:7 },
    
  { name: '<span style="font-size:9px;color:#000; background:#fff; padding:2px 0px 2px 4px; border-radius:25px; margin-right:-3px;">▶ </span> &nbsp; 3', url: "https://flixxlive.pro/tv/canalfoot_france.php",  countdown:7 },
  
  { name: '<span style="font-size:9px;color:#000; background:#fff; padding:2px 0px 2px 4px; border-radius:25px; margin-right:-3px;">▶ </span> &nbsp; 4', url:            
     //"https://nostrem.click/tv/skysport6_english.php", 
     "https://nostrem.click/tv/skyfootball_english.php",  
   countdown: 7 },
  
];

let currentServerIndex = 0;

const iframe = document.getElementById("player");
const serverContainer = document.getElementById("serverButtons");
const loader = document.getElementById("loding");
const msg = document.getElementById("unmuteMsg");

function renderServerButtons(){
    serverContainer.innerHTML = "";

    serverData.forEach((server, index)=>{
        let btn = document.createElement("div");
        btn.className = "server-btn";
        btn.innerText = server.name;
      
        // ADD এখানে পরিবর্তন
        btn.innerHTML = server.name;
      
        btn.onclick = () => switchServer(index);

        serverContainer.appendChild(btn);
    });

    updateUI();
}

function switchServer(index){

    currentServerIndex = index;

    iframe.src = "about:blank";

    updateUI();

    const server = serverData[index];



    setTimeout(()=>{
        iframe.src = server.url + "?t=" + Date.now();
        showUnmuteMessage();
    if(server.countdown > 0){
        showLoading(server.countdown);
    } else {
        hideLoading();
    }
      
    }, 50);
}

function updateUI(){
    document.querySelectorAll(".server-btn").forEach((btn,i)=>{
        btn.classList.toggle("active", i === currentServerIndex);
    });
}

let loadTimer = null;

function showLoading(time){

    loader.style.display = "block";
    //loader.innerText = time + " Loding..";

    // আগের timer clear
    clearTimeout(loadTimer);

    // auto hide after time
    loadTimer = setTimeout(()=>{
        loader.style.display = "none";
    }, time * 1000);
}

function hideLoading(){
    loader.style.display = "none";
}

function showUnmuteMessage(){
    msg.classList.add("show");

    setTimeout(()=>{
        msg.classList.remove("show");
    }, 3000);
}

window.onload = function(){
    renderServerButtons();
    switchServer(currentServerIndex);
};
  
  
  
// Refresh Video
function refreshVideo() {
    let player = document.getElementById('player');
    let currentSrc = player.src;
    player.src = ''; // Reset the video source
    player.src = currentSrc; // Reload the video
}
</script>
  
  
  </body>
