// এখানে তোমার GitHub Raw JSON URL বসাও raw.githubusercontent.com
const jsonURL = "https://raw.githubusercontent.com/asmaakther/player/main/uddinsp.json"; // 🔹 এখানে পরিবর্তন করো

// ===== FETCH EXTERNAL DATA =====
fetch(jsonURL)
.then(res => res.json()) // JSON হিসেবে parse করা হচ্ছে
.then(data => {

    // data হলো array [{id,img,link,countdown,categories}, ...]
    data.forEach(channel => {

        // videos array থেকে channel.id এর সাথে মিলে এমন object খুঁজে নেওয়া
        let videoObj = videos.find(v => v.name === channel.id);
        if(!videoObj) return; // যদি না মিলে, skip করা

        // 🔹 ভিডিও ডাটা আপডেট
        videoObj.img = channel.img || ""; // ছবি লিংক
        videoObj.link = channel.link || ""; // ভিডিও লিংক
        videoObj.countdown = channel.countdown || null; // কাউন্টডাউন সেকেন্ড
        videoObj.categories = channel.categories || []; // ক্যাটেগরি
    });

    // 🔹 শুধু সেই ভিডিও রাখো যা GitHub JSON-এ আছে
    let externalChannelIds = data.map(c => c.id);
    videos = videos.filter(v => externalChannelIds.includes(v.name));

    console.log("✅ External JSON data loaded:", videos);

    // 🔹 ভিডিও বাটন রেন্ডার করা
    renderButtons();

    // 🔹 প্রথম ভিডিও লোড
    loadVideo(0);

})
.catch(err => {
    console.error("❌ JSON load error:", err);
});


// ===== FILTER FUNCTION =====
// নির্বাচিত ক্যাটেগরির ভিডিও filter করা
function getFiltered(){
    return videos.filter(v =>
        currentCategory === "all" ||          // যদি all selected থাকে
        v.categories.includes(currentCategory) // অথবা matching category থাকে
    );
}


// ===== LOAD VIDEO =====
function loadVideo(index) {

    var filtered = getFiltered();
    if(filtered.length === 0) return;

    // Safe loop index
    if(index >= filtered.length) index = 0;
    if(index < 0) index = filtered.length - 1;

    currentIndex = index;

    // Scroll to video section
    document.getElementById("logo")
        .scrollIntoView({behavior:"smooth", block:"start"});

    // Stop previous video if function exists
    if(typeof killEverything === "function"){
        killEverything();
    }

    // Stop old countdown
    if(countdownInterval){
        clearInterval(countdownInterval);
        countdownInterval = null;
    }

    document.getElementById("countdownDiv").style.display = "none";

    let videoData = filtered[index];
    let videoUrl = videoLinkData?.[videoData.name.trim()] || videoData.link;

    // ❌ যদি link না থাকে → কিছুই করবে না
    if(!videoUrl || videoUrl.trim() === ""){
        return;
    }

    // Countdown start (if exists)
    if(videoData.countdown && videoData.countdown > 0){
        startCountdown(videoData.countdown);
    }

    // Force reload iframe cleanly
    let mainPlayer = document.getElementById("player");

    mainPlayer.src = "";
    setTimeout(() => {
        mainPlayer.src = videoUrl;
    }, 150);

    updateActive();
}

// ===== RENDER BUTTONS =====
function renderButtons(){
    var list=document.getElementById("videoList");
    list.innerHTML="";
    var filtered=getFiltered();

    filtered.forEach((v,index)=>{
        let div=document.createElement("div");
        div.className="video-btn";

        div.innerHTML=`
        <img src="${v.img || 'https://placehold.co/60x60/ddd/999?text=no%0Aimage'}" 
             onerror="this.src='https://placehold.co/60x60/ddd/999?text=no%0Aimage'">
        <div >${v.name}</div>`;

        div.onclick=function(){
            loadVideo(index);
        };

        list.appendChild(div);
    });

    updateActive();
}


// ===== UPDATE ACTIVE =====
function updateActive(){
    document.querySelectorAll(".video-btn")
    .forEach(btn=>btn.classList.remove("active"));

    var btns=document.querySelectorAll(".video-btn");
    if(btns[currentIndex]) btns[currentIndex].classList.add("active");
}


// ===== CATEGORY BUTTON =====
function filterCategory(cat,btn){
    currentCategory=cat;
    currentIndex=0;

    document.querySelectorAll(".categories button")
    .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    renderButtons();
    loadVideo(0);
}


// ===== COUNTDOWN =====
function startCountdown(seconds){

    const div=document.getElementById("countdownDiv");

    div.style.display="block";
    div.innerText=seconds;

    countdownInterval=setInterval(()=>{
        seconds--;
        if(seconds>0){
            div.innerText=seconds;
        }else{
            clearInterval(countdownInterval);
            countdownInterval=null;
            div.style.display="none";
        }
    },1000);
}

<script>

====================== */
function scrollNext(){
    document.getElementById("videoList").scrollBy({left:200, behavior:"smooth"});
}

function scrollPrev(){
    document.getElementById("videoList").scrollBy({left:-200, behavior:"smooth"});
}

function nextVideo(){ loadVideo(currentIndex+1); }
function prevVideo(){ loadVideo(currentIndex-1); }

function filterCategory(cat, btn){
    currentCategory = cat;
    currentIndex = 0; // reset index
    document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    window.scrollTo({ top: 0, behavior: "instant" });

    // নতুন category এর প্রথম ভিডিও auto load
    loadVideo(0);
}

    var box = document.getElementById("videoBox");
    if(!document.fullscreenElement){
        box.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* ===== KEYBOARD + TV ===== */
document.addEventListener("keydown", function(e){
    if(e.key === "ArrowRight") nextVideo();
    if(e.key === "ArrowLeft") prevVideo();

    const player = document.getElementById("player");
    if(e.key === "Enter" || e.key === " "){ // Enter or Space
        e.preventDefault();
        if(player.src && !player.paused){ 
            player.contentWindow.postMessage('pause','*'); 
        } else {
            player.contentWindow.postMessage('play','*');
        }
    }
});

/* ===== STOP WHEN HIDE ===== */
document.addEventListener("visibilitychange", function(){
    if(document.hidden){
        document.getElementById("player").src = "";
    }
});

/* ===== PAGE LOAD FLAG ===== */
let firstLoadDone = false;

window.onload = function(){
    if(firstLoadDone) return; // prevent double load
    firstLoadDone = true;

    currentCategory = "all";

    // ALL button active
    document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
    document.querySelector(".categories button").classList.add("active");

   // renderButtons();
    //loadVideo(0); // প্রথম ভিডিও auto play
};

/* ===== FIRST USER TOUCH ===== */
document.addEventListener("touchstart", function firstTouch(){
    if(firstLoadDone) return;
    loadVideo(0);
    firstLoadDone = true;
    document.removeEventListener("touchstart", firstTouch);
});
</script>
  
  
<script>
  
  
/* ===== Overlay Opacity Logic ===== */
const playerBox = document.getElementById("videoBox");
let overlayTimer;

function handleInteraction() {
    // মাউস নড়লে playerBox এ active ক্লাস যোগ হবে (CSS এর মাধ্যমে Next/Full বাটন উজ্জ্বল হবে)
    playerBox.classList.add("mouse-active");

    // আগের টাইমার ক্লিয়ার করা
    clearTimeout(overlayTimer);

    // ৫ সেকেন্ড (৫০০০ms) পর বাটনগুলো আবার হালকা (০.১) হয়ে যাবে
    overlayTimer = setTimeout(() => {
        playerBox.classList.remove("mouse-active");
    }, 5000);
}

// মাউস নড়লে এবং টাচ করলে ফাংশনটি চলবে
playerBox.addEventListener("mousemove", handleInteraction);
playerBox.addEventListener("touchstart", handleInteraction);

// মাউস ভিডিওর বাইরে চলে গেলে সাথে সাথে হালকা করে দেওয়া (ঐচ্ছিক)
playerBox.addEventListener("mouseleave", () => {
    playerBox.classList.remove("mouse-active");
});
  
  
  </script>
<script>
function killEverything() {

    console.log("Killing player...");

    const f = document.getElementById("player"); // <-- iframe id

    // 🔴 Iframe Kill
    if (f) {
        f.src = "about:blank";
        f.removeAttribute("src");
    }

    // 🔴 Timer stop
    if (window.currentTimer) {
        clearInterval(window.currentTimer);
    }

    // 🔴 HLS destroy (if any)
    if (window.hls) {
        window.hls.destroy();
    }
}

/* ============================
   👉 Page leave detect
============================ */
window.addEventListener("pagehide", killEverything);
window.addEventListener("beforeunload", killEverything);

/* ============================
   👉 Mobile back / minimize detect
============================ */
document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
        killEverything();
        sessionStorage.setItem("needReload", "yes");  // mark for reload
    } else {
        if (sessionStorage.getItem("needReload") === "yes") {
            sessionStorage.removeItem("needReload");
            location.reload();   // 🔥 one time fresh reload
        }
    }
});

/* ============================
   👉 Media Session (Mobile / TV)
============================ */
if ("mediaSession" in navigator) {
    navigator.mediaSession.setActionHandler("play", null);
    navigator.mediaSession.setActionHandler("pause", null);
}
</script>
