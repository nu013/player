<script type='text/javascript'>
//<![CDATA[
const API_KEY = '844dba0bfd8f3a4f3799f6130ef9e335';
const urlParams = new URLSearchParams(window.location.search);
let currentId = urlParams.get('id');
let type = urlParams.get('type') || 'movie';

// যদি URL এ না থাকে, ক্লাস থেকে নেবে
if (!currentId) {
    const storeDiv = document.querySelector('.tmdb-id-store');
    if (storeDiv) currentId = storeDiv.innerText.trim();
}

/* =====================================================
   INITIAL DATA LOAD
===================================================== */
if (currentId) {
    let fetchUrl = type === 'movie' 
        ? `https://api.themoviedb.org/3/movie/${currentId}?api_key=${API_KEY}`
        : `https://api.themoviedb.org/3/tv/${currentId}?api_key=${API_KEY}`;

    fetch(fetchUrl)
        .then(res => res.json())
        .then(data => {
            document.getElementById('d-title').innerText = type === 'movie' ? data.title : data.name;
            document.getElementById('d-desc').innerText = data.overview;
            document.getElementById('d-poster').src = 'https://image.tmdb.org/t/p/w500' + data.poster_path;
            document.getElementById('d-meta').innerHTML = `📅 ${type === 'movie' ? data.release_date : data.first_air_date} | ⭐ ${data.vote_average.toFixed(1)}`;

      
      document.getElementById('d-title').innerText = type === 'movie' ? data.title : data.name;
document.getElementById('d-desc').innerText = data.overview;
document.getElementById('d-poster').src = 'https://image.tmdb.org/t/p/w500' + data.poster_path;

// অতিরিক্ত তথ্যগুলো বের করা
const genres = data.genres.map(g => g.name).join(', ') || 'N/A';
const originalLang = data.original_language ? data.original_language.toUpperCase() : 'N/A';
const productionCountry = data.production_countries && data.production_countries.length > 0 
    ? data.production_countries.map(c => c.name).join(', ') 
    : 'N/A';

// ডিরেক্টর বা ক্রিয়েটর বের করা
let director = 'N/A';
if (type === 'movie' && data.credits && data.credits.crew) {
    const dirInfo = data.credits.crew.find(person => person.job === 'Director');
    if (dirInfo) director = dirInfo.name;
} else if (type === 'tv' && data.created_by && data.created_by.length > 0) {
    director = data.created_by.map(c => c.name).join(', ');
}

// লাইন বাই লাইন ডাটা সেট করা
document.getElementById('d-meta').innerHTML = `
    <div class="info-line"><b>📅 Release:</b> ${type === 'movie' ? data.release_date : data.first_air_date}</div>
    <div class="info-line"><b>⭐ Rating:</b> ${data.vote_average.toFixed(1)} / 10</div>
    <div class="info-line"><b>🎬 Director:</b> ${director}</div>
    <div class="info-line"><b>🎭 Genre:</b> ${genres}</div>
    <div class="info-line"><b>🌐 Original Lang:</b> ${originalLang}</div>
    <div class="info-line"><b>📍 Made In:</b> ${productionCountry}</div>
    <div class="info-line"><b>⏱️ Runtime:</b> ${type === 'movie' ? data.runtime + ' min' : data.number_of_seasons + ' Seasons'}</div>
`;
      
            if (type === 'movie') {
                loadSimilarMovies(currentId);
            } else {
                loadSimilarTV(currentId);
            }

            // প্রথমবার লোড হওয়ার সময় সার্ভার ১ ডিফল্ট হিসেবে কল হবে
            switchDynamicS(1);
        });
}

/* =====================================================
   SWITCH SERVER LOGIC (Main Function)
===================================================== */
async function switchDynamicS(n) {
    // অ্যাক্টিভ বাটন স্টাইল পরিবর্তন
    let btns = document.querySelectorAll('.btn-s');
    btns.forEach((b, i) => b.classList.toggle('active', i === n - 1));

    const tvControls = document.getElementById("tvControls");
    const episodeNav = document.getElementById("episodeNav");

    if (type === 'tv') {
        if (tvControls) tvControls.style.display = "flex";
        if (episodeNav) episodeNav.style.display = "flex";
        showTVControls(); 

        // সিজন লিস্ট খালি থাকলে ফেচ করবে, তারপর ভিডিও লোড করবে
        if (document.getElementById("seasonSelect").innerHTML === "") {
            await fetchSeasons(currentId);
        } else {
            generateFinalUrl(n);
        }
    } else {
        // মুভি মোড
        if (tvControls) tvControls.style.display = "none";
        if (episodeNav) episodeNav.style.display = "none";
        generateFinalUrl(n);
    }
  
// ভিডিও পরিবর্তনের সাথে সাথে অ্যাড সাইকেল শুরু হবে
    startAdCycle();  
}

/* =====================================================
   TV DATA FETCHING
===================================================== */
async function fetchSeasons(id) {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
    const data = await res.json();
    const seasonSelect = document.getElementById("seasonSelect");
    if (!seasonSelect) return;
    
    seasonSelect.innerHTML = "";
    data.seasons.forEach(s => {
        if (s.season_number > 0) {
            let opt = document.createElement("option");
            opt.value = s.season_number;
            opt.innerText = `Season ${s.season_number}`;
            seasonSelect.appendChild(opt);
        }
    });
    fetchEpisodes();
}

async function fetchEpisodes() {
    const sNum = document.getElementById("seasonSelect").value;
    const res = await fetch(`https://api.themoviedb.org/3/tv/${currentId}/season/${sNum}?api_key=${API_KEY}`);
    const data = await res.json();
    const epSelect = document.getElementById("episodeSelect");
    if (!epSelect) return;
    
    epSelect.innerHTML = "";
    data.episodes.forEach(e => {
        let opt = document.createElement("option");
        opt.value = e.episode_number;
        opt.innerText = `Episode ${e.episode_number}`;
        epSelect.appendChild(opt);
    });
    
    // এপিসোড লিস্ট লোড হওয়ার পর ভিডিও সোর্স জেনারেট করা
    let activeBtn = document.querySelector('.btn-s.active');
    let n = activeBtn ? parseInt(activeBtn.innerText.match(/\d+/)[0]) : 1;
    generateFinalUrl(n);
}

function changeEpisode() {
    let activeBtn = document.querySelector('.btn-s.active');
    let n = activeBtn ? parseInt(activeBtn.innerText.match(/\d+/)[0]) : 1;
    generateFinalUrl(n);
}

/* =====================================================
   CONTROLS & NAVIGATION
===================================================== */
function nextEpisode() {
    const epSelect = document.getElementById("episodeSelect");
    if (epSelect && epSelect.selectedIndex < epSelect.options.length - 1) {
        epSelect.selectedIndex++;
        changeEpisode();
        showTVControls();
    }
}

function prevEpisode() {
    const epSelect = document.getElementById("episodeSelect");
    if (epSelect && epSelect.selectedIndex > 0) {
        epSelect.selectedIndex--;
        changeEpisode();
        showTVControls();
    }
}

let tvHideTimer;
function showTVControls() {
    const tvControls = document.getElementById("tvControls");
    if (!tvControls || type !== 'tv') return;

    tvControls.classList.add("show");
    clearTimeout(tvHideTimer);
    tvHideTimer = setTimeout(() => {
        if (!tvControls.matches(':hover')) {
            tvControls.classList.remove("show");
        }
    }, 5000);
}

// Event Listeners for Controls
const playerWrapper = document.querySelector(".player-wrapper");
if (playerWrapper) {
    playerWrapper.addEventListener("mousemove", showTVControls);
    playerWrapper.addEventListener("touchstart", showTVControls);
}

/* =====================================================
   SIMILAR MOVIES & TV
===================================================== */
function loadSimilarMovies(id) {
    fetch(`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${API_KEY}`)
        .then(res => res.json())
        .then(res => renderSimilar(res.results, 'movie'));
}

function loadSimilarTV(id) {
    fetch(`https://api.themoviedb.org/3/tv/${id}/similar?api_key=${API_KEY}`)
        .then(res => res.json())
        .then(res => renderSimilar(res.results, 'tv'));
}

function renderSimilar(data, mType) {
    let html = '';
    data.slice(0, 12).forEach(m => {
        if (m.poster_path) {
            html += `
            <div class="s-card">
                <a href="/p/watch.html?id=${m.id}&type=${mType}">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" alt="${m.title || m.name}"/>
                    <span>${m.title || m.name}</span>
                </a>
            </div>`;
        }
    });
    document.getElementById('suggested-list').innerHTML = html;
}

/* ==================
অ্যাড ahow টাইমার সাইকেল শুরু
==================== */

var adTimer;

// ১. অ্যাড সাইকেল শুরু করার ফাংশন
function startAdCycle() {
    // আগে যদি কোনো অ্যাড টাইমার থাকে তা বন্ধ করা
    clearTimeout(adTimer);
    document.getElementById('delayed-ad').style.display = 'none';

    // ১ মিনিট (৬০,০০০ মিলি-সেকেন্ড) পর অ্যাড দেখাবে
    // আপনি চাইলে সময় কমাতে বা বাড়াতে পারেন (যেমন: ১০ সেকেন্ড হলে ১০০০০)
    adTimer = setTimeout(showAd, 1 * 60 * 1000);  // 2 * 60 * 1000 এর জায়গায় 5000 (৫ সেকেন্ড) দিয়ে পারেন 
}

// ২. অ্যাড দেখানোর ফাংশন
function showAd() {
    document.getElementById('delayed-ad').style.display = 'block';
}

// ৩. অ্যাড লুকানোর ফাংশন
function hideAd() {
    document.getElementById('delayed-ad').style.display = 'none';
    
    // অ্যাড বন্ধ করার ১০ মিনিট পর আবার দেখানোর জন্য টাইমার সেট করা
    clearTimeout(adTimer);
    adTimer = setTimeout(showAd, 10 * 60 * 1000); 
}
