// Countdown function
function showVideoCountdown(seconds=5){
    const overlay=document.getElementById("cowndown");
    overlay.style.display="flex";
    overlay.innerText=seconds;
    let counter=seconds;
    const interval=setInterval(()=>{
        counter--;
        if(counter>0) overlay.innerText=counter;
        else {overlay.style.display="none"; clearInterval(interval);}
    },1000);
}

// Matches লোড
var url="https://api.codetabs.com/v1/proxy?quest=https://sportsonline.st/prog.txt";
var matchesList=[];

fetch(url).then(r=>r.text()).then(data=>buildSchedule(data));

function buildSchedule(data){
    matchesList = [];
    var container = document.getElementById("schedule");
    container.innerHTML = "";
    var lines = data.split("\n");
    const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
    let currentDay = "";

    // একই ম্যাচের লিংকগুলো সংরক্ষণ করার অবজেক্ট
    var matchesData = {};

    function nextDay(day){ let i = days.indexOf(day); return days[(i+1)%7]; }

    lines.forEach(function(line){
        line = line.trim();
        if(days.includes(line)){ currentDay = line; return; }

        var t = line.match(/(\d{2}:\d{2})/);
        var l = line.match(/https?:\/\/\S+/);
        if(!t || !l) return;

        var time = t[1];
        var link = l[0];
        var title = line.replace(time,"").split("|")[0].trim();

        if(/(NBA|NHL|MotoGP|UFC|Tennis|Judo|Padel)/i.test(title)) return;
        if(!title.includes(" x ")) return;

        let hour = parseInt(time.split(":")[0]);
        let dayName = currentDay; 
        if(hour < 6) dayName = nextDay(currentDay);

        // একই ম্যাচের লিংকগুলো গ্রুপ করা
        if(!matchesData[title]){
            matchesData[title] = { time: time, day: dayName, links: [] };
        }
        matchesData[title].links.push(link);
    });

    // HTML তৈরি
    Object.keys(matchesData).forEach(title => {
        var m = document.createElement("div");
        m.className = "match";
        m.innerHTML = `<span class="status-left"></span> <span style="font-size:14px;color:lime;"><u> ${title} </u>  </span> <br>`;

        m.setAttribute("timeStr", matchesData[title].time);
        m.setAttribute("dayName", matchesData[title].day);
        container.appendChild(m);
      
      
m.setAttribute("data-links", JSON.stringify(matchesData[title].links));

// 👉 match click event ADD
m.onclick = function(){
   //showMatchLinks(this);
   showMatchLinks(this, true); // 🔥 user click

};
      
      

        matchesList.push({ element: m, timeStr: matchesData[title].time, day: matchesData[title].day });
    });

    setInterval(updateLiveStatus, 1000);
    updateLiveStatus();

    // প্রথম ম্যাচের প্রথম লিংক অটো-প্লে
setTimeout(() => {
    let matches = document.querySelectorAll(".match");

    for (let m of matches) {
        if (m.style.display !== "none") {

            // 👉 direct call
            showMatchLinks(m);

            break;
        }
    }
}, 500);

// লন্ডনের সময়
function londonNow(){
    let now=new Date();
    let utc=now.getTime()+(now.getTimezoneOffset()*60000);
    let offset=0;
    let year=now.getFullYear();
    let lastSundayMarch=new Date(year,2,31);
    lastSundayMarch.setDate(31-(lastSundayMarch.getDay()));
    let lastSundayOct=new Date(year,9,31);
    lastSundayOct.setDate(31-(lastSundayOct.getDay()));
    if(now>=lastSundayMarch && now<lastSundayOct) offset=1;
    return new Date(utc+(3600000*offset));
}
  
  
  
// UK time → Local time converter
function convertToLocalTime(timeStr, dateStr) {
    try {
        if (!timeStr) return "";

        let isoString;

        if (dateStr) {
            isoString = dateStr + "T" + timeStr;
        } else {
            const today = new Date().toISOString().split("T")[0];
            isoString = today + "T" + timeStr;
        }

        // UK time (BST +01:00)
        const ukDate = new Date(isoString + "+01:00");

        return ukDate.toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit',
            //hour12: true // ✅ 12-hour format
          hour12: false   // ✅ 24-hour format
        });

    } catch (e) {
        return timeStr;
    }
}
  
  
// Play match function
function playMatch(el) {
    let link = el.getAttribute("data-link");

    // Video play
    document.getElementById("player").src = link;

    // Disable all other buttons
    document.querySelectorAll(".link-btn").forEach(b => {
        b.classList.remove("active");
        b.style.background = "lime";
    });

    // Mark the current button as active
    el.classList.add("active");
    el.style.background = "#74EDE1";
    el.style.color = "#e00000";

    // Mark the match as active
    document.querySelectorAll(".match").forEach(m => m.classList.remove("active"));
    el.closest(".match").classList.add("active");

    // Show loading message
    let loadingMsg = document.getElementById("lodingMsg");
    loadingMsg.innerText = "Loading...";
    loadingMsg.style.display = "block";

    setTimeout(() => {
        loadingMsg.style.display = "none";
    }, 7000);

    // Show unmute message
    showUnmuteMessage();
}
  
// Refresh Video
function refreshVideo() {
    let player = document.getElementById('player');
    let currentSrc = player.src;
    player.src = ''; // Reset the video source
    player.src = currentSrc; // Reload the video
}

    btn.onclick = function () {
        playMatch(this);
    };
    return btn;
}

            unmuteMsg.classList.remove("show");

        },3000);

    },2000);
